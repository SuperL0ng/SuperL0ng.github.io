name: Promote dashboard ticket binding V5

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - .dashboard-binding-v5-trigger

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/checkout@v4
        with:
          repository: SuperL0ng/parlay-tracker
          ref: main
          path: app-source
          fetch-depth: 1
      - name: Promote and verify V5
        shell: bash
        run: |
          cp app-source/show-legs-label-fix.js show-legs-label-fix.js
          rm -rf app-source
          python3 - <<'PY'
          from pathlib import Path
          path=Path('index.html')
          text=path.read_text()
          old='./show-legs-label-fix.js?v=4'
          new='./show-legs-label-fix.js?v=5'
          if text.count(old)!=1:
              raise SystemExit(f'expected one root V4 cache key, found {text.count(old)}')
          path.write_text(text.replace(old,new,1))
          PY
          node --check show-legs-label-fix.js
          grep -q 'DASHBOARD TICKET ID BINDING V5' show-legs-label-fix.js
          grep -q "selectButton.click" show-legs-label-fix.js
          grep -q 'show-legs-label-fix.js?v=5' index.html
      - name: Commit V5 promotion
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add show-legs-label-fix.js index.html
          git commit -m "Promote dashboard ticket ID binding V5"
          git push origin HEAD:${{ github.head_ref }}
